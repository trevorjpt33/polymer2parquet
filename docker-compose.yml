services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: polymer2parquetdb
      POSTGRES_USER: polymer2parquetuser
      POSTGRES_PASSWORD: polymer2parquetpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymer2parquetuser -d polymer2parquetdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: polymer2parquet-backend:latest
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: your-secret-key-here
      DEBUG: "True"
      POSTGRES_DB: polymer2parquetdb
      POSTGRES_USER: polymer2parquetuser
      POSTGRES_PASSWORD: polymer2parquetpassword
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://104.154.136.31/api
    image: polymer2parquet-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: