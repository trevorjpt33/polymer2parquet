apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: polymer2parquet-routes
  namespace: polymer2parquet
spec:
  parentRefs:
    - name: polymer2parquet-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend-service
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: backend-service
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 80