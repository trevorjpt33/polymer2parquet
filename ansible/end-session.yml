---
- name: End polymer2parquet session
  hosts: local
  connection: local
  vars:
    cluster: polymer2parquet-cluster
    node_pool: polymer2parquet-node-pool
    zone: us-central1-f
    k8s_namespace: polymer2parquet

  tasks:
    - name: Scale down deployments
      shell: |
        kubectl scale deployment backend frontend postgres \
          -n {{ k8s_namespace }} --replicas=0

    - name: Wait for pods to terminate
      shell: |
        kubectl wait pod \
          --for=delete \
          --all \
          -n {{ k8s_namespace }} \
          --timeout=120s

    - name: Scale down node pool
      shell: |
        gcloud container clusters resize {{ cluster }} \
          --node-pool {{ node_pool }} \
          --num-nodes 0 \
          --zone {{ zone }} \
          --quiet

    - name: Wait for node pool to fully scale down
      shell: |
        gcloud container node-pools describe {{ node_pool }} \
          --cluster {{ cluster }} \
          --zone {{ zone }} \
          --format="value(status)"
      register: pool_status
      until: pool_status.stdout == "RUNNING"
      retries: 20
      delay: 30

    - name: Print final node pool status
      debug:
        msg: "Node pool status: {{ pool_status.stdout }}"