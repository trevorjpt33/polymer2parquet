name: Deploy backend to GKE

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy-backend:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-backend:latest \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-backend:${{ github.sha }} \
            ./backend
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-backend:latest
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-backend:${{ github.sha }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: us-central1-f

      - name: Roll out backend
        run: |
          kubectl rollout restart deployment/backend -n polymer2parquet
          kubectl rollout status deployment/backend -n polymer2parquet --timeout=120s