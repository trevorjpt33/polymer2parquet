name: Deploy frontend to GKE

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secrets with truffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://104.154.136.31/api \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-frontend:latest \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-frontend:${{ github.sha }} \
            ./frontend
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-frontend:latest
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-frontend:${{ github.sha }}

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/polymer2parquet/polymer2parquet-frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: us-central1-f

      - name: Roll out frontend
        run: |
          kubectl rollout restart deployment/frontend -n polymer2parquet
          kubectl rollout status deployment/frontend -n polymer2parquet --timeout=120s

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Frontend security scan failed on commit ${context.sha.slice(0, 7)}`,
              body: `A security scan step failed in the frontend CI/CD pipeline.\n\n**Commit:** ${context.sha}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and resolve before the next deployment.`,
              labels: ['bug', 'devops']
            })